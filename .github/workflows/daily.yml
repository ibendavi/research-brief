name: Build daily research brief

on:
  schedule:
    # GitHub cron is UTC. 09:00 UTC = 5:00am EDT (summer) / 4:00am EST (winter).
    # For a steady 5:00am EST in winter, change to '0 10 * * *'.
    - cron: '0 9 * * *'
  workflow_dispatch: {}   # lets you trigger a rebuild manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install feedparser

      - name: Build brief
        run: python build.py

      - name: Commit updated site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily brief $(date -u +%Y-%m-%d)"
            git push
          fi
